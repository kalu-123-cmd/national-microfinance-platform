apiVersion: v2
name: microfinance
description: National Digital Microfinance Platform - Production Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - microfinance
  - banking
  - fintech
  - ethiopia
maintainers:
  - name: Platform Team
    email: platform@microfinance.et
dependencies:
  - name: postgresql
    version: "13.4.4"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "18.19.4"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: kafka
    version: "26.11.4"
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
  - name: mongodb
    version: "14.12.1"
    repository: https://charts.bitnami.com/bitnami
    condition: mongodb.enabled
