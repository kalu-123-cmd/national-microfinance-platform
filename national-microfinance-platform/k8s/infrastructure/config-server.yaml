apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: microfinance
  labels:
    app: config-server
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: microfinance/config-server:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: microfinance-config
                  key: JAVA_OPTS
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: microfinance
spec:
  selector:
    app: config-server
  ports:
    - port: 8888
      targetPort: 8888
