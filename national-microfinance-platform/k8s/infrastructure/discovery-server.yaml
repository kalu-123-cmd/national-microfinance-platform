apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: microfinance
  labels:
    app: discovery-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      initContainers:
        - name: wait-for-config
          image: curlimages/curl:8.6.0
          command: ['sh', '-c', 'until curl -sf http://config-server:8888/actuator/health; do echo waiting for config-server; sleep 5; done']
      containers:
        - name: discovery-server
          image: microfinance/discovery-server:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8761
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: microfinance
spec:
  selector:
    app: discovery-server
  ports:
    - port: 8761
      targetPort: 8761
