# DOCUMENT MANAGEMENT SERVICE (port 8097, replicas: 2)
# ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-management-service
  namespace: microfinance
  labels:
    app: document-management-service
    version: "1.0.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: document-management-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: document-management-service
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8097"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: microfinance-app
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: document-management-service
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-discovery
          image: curlimages/curl:8.6.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ['sh','-c','until curl -sf http://discovery-server:8761/actuator/health; do sleep 5; done']
      containers:
        - name: document-management-service
          image: ghcr.io/microfinance-et/microfinance-document-management-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8097
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: microfinance-config
            - secretRef:
                name: microfinance-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8097
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8097
            initialDelaySeconds: 60
            periodSeconds: 15
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8097
            failureThreshold: 18
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: document-management-service
  namespace: microfinance
spec:
  selector:
    app: document-management-service
  ports:
    - name: http
      port: 8097
      targetPort: 8097

