# ==============================================================================
# Production Microservice Deployments — All 21 Services
# Enhancements: anti-affinity, securityContext, lifecycle hooks,
#               topology spread, Prometheus annotations
# National Digital Microfinance Platform — Production
# ==============================================================================

# ── TEMPLATE EXPLANATION ──────────────────────────────────────────────────────
# Each deployment includes:
#  - podAntiAffinity: spread replicas across nodes
#  - topologySpreadConstraints: balance across zones
#  - securityContext: non-root, drop all capabilities
#  - lifecycle.preStop: graceful drain before kill
#  - terminationGracePeriodSeconds: 60s for safe shutdown
#  - prometheus annotations: auto-discovered by Prometheus
#  - imagePullPolicy: Always (ensures latest digest from registry)
#  - serviceAccountName: microfinance-app (least-privilege SA)
# =============================================================================

---
# ────────────────────────────────────────────────────────────────
# AUTH SERVICE  (port 8081, replicas: 2, critical)
# ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: microfinance
  labels:
    app: auth-service
    version: "1.0.0"
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: microfinance-platform
    app.kubernetes.io/component: security
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth-service
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: microfinance-app
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: auth-service
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: auth-service
      initContainers:
        - name: wait-for-discovery
          image: curlimages/curl:8.6.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          command: ['sh','-c','until curl -sf http://discovery-server:8761/actuator/health; do echo "waiting for eureka..."; sleep 5; done']
      containers:
        - name: auth-service
          image: ghcr.io/microfinance-et/microfinance-auth-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          envFrom:
            - configMapRef:
                name: microfinance-config
            - secretRef:
                name: microfinance-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            failureThreshold: 18
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: microfinance
  labels:
    app: auth-service
    app.kubernetes.io/name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      protocol: TCP

