# ==============================================================================
# PodDisruptionBudgets — All Critical Services
# National Digital Microfinance Platform — Production
# ==============================================================================

# ── auth-service ───────────────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  namespace: microfinance
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: auth-service

