# ---- user-service ----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: microfinance
spec:
  replicas: 2
  selector:
    matchLabels: { app: user-service }
  template:
    metadata:
      labels: { app: user-service }
    spec:
      containers:
        - name: user-service
          image: ${DOCKER_REGISTRY}/user-service:${IMAGE_TAG:-latest}
          ports: [{ containerPort: 8082 }]
          env:
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://postgres-user:5432/user_db" }
            - { name: SPRING_DATASOURCE_USERNAME, value: postgres }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: microfinance-secrets, key: DB_PASSWORD } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: microfinance-secrets, key: JWT_SECRET } }
            - { name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE, value: "http://discovery-server:8761/eureka/" }
          resources:
            requests: { memory: 256Mi, cpu: 200m }
            limits: { memory: 512Mi, cpu: 500m }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8082 }
            initialDelaySeconds: 30
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8082 }
            initialDelaySeconds: 60
---
apiVersion: v1
kind: Service
metadata: { name: user-service, namespace: microfinance }
spec:
  selector: { app: user-service }
  ports: [{ port: 8082, targetPort: 8082 }]
---
