# ==============================================================================
# Filebeat DaemonSet — Runs on every node, ships container logs to Logstash
# National Digital Microfinance Platform — Production
# ==============================================================================

# ── Filebeat ConfigMap ────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: microfinance-elk
data:
  filebeat.yml: |
    filebeat.autodiscover:
      providers:
        - type: kubernetes
          node: ${NODE_NAME}
          hints.enabled: true
          hints.default_config:
            type: container
            paths:
              - /var/log/containers/*${data.kubernetes.container.id}.log
            # Multiline support for Java stack traces
            multiline:
              type: pattern
              pattern: '^\s'
              negate: false
              match: after
              max_lines: 500
              timeout: 5s
          # Only collect from microfinance namespace
          templates:
            - condition:
                equals:
                  kubernetes.namespace: microfinance
              config:
                - type: container
                  paths:
                    - /var/log/containers/*${data.kubernetes.container.id}.log
                  multiline:
                    type: pattern
                    pattern: '^[[:space:]]'
                    negate: false
                    match: after
                    max_lines: 500

    processors:
      - add_cloud_metadata: ~
      - add_host_metadata: ~
      - add_kubernetes_metadata:
          host: ${NODE_NAME}
          matchers:
            - logs_path:
                logs_path: "/var/log/containers/"
      - drop_event:
          when:
            or:
              - equals:
                  kubernetes.namespace: kube-system
              - equals:
                  kubernetes.namespace: kube-public
              - regexp:
                  message: "^kube-probe"
      # Add environment enrichment
      - add_fields:
          target: ''
          fields:
            environment: production
            platform: microfinance-et
            region: addis-ababa

    output.logstash:
      hosts: ["logstash:5044"]
      bulk_max_size: 2048
      worker: 4
      loadbalance: true
      timeout: 30s
      ttl: 0
      pipelining: 10
      compression_level: 3

    # Internal queue to buffer events during logstash unavailability
    queue.mem:
      events: 4096
      flush.min_events: 512
      flush.timeout: 5s

    logging.level: info
    logging.to_files: true
    logging.files:
      path: /var/log/filebeat
      name: filebeat
      keepfiles: 7
      permissions: 0644

    # Monitoring
    http.enabled: true
    http.port: 5066

---
# ── Filebeat DaemonSet ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: microfinance-elk
  labels:
    app: filebeat
    app.kubernetes.io/name: filebeat
    app.kubernetes.io/component: logging
spec:
  selector:
    matchLabels:
      app: filebeat
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: filebeat
    spec:
      serviceAccountName: filebeat
      terminationGracePeriodSeconds: 30
      tolerations:
        # Run on master nodes too
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.12.2
          args: ["-c", "/etc/filebeat.yml", "-e"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            runAsUser: 0
            # Required to read container log files
            privileged: false
          volumeMounts:
            - name: config
              mountPath: /etc/filebeat.yml
              subPath: filebeat.yml
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            - name: data
              mountPath: /usr/share/filebeat/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  #!/usr/bin/env bash -e
                  filebeat test config
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: filebeat-config
            defaultMode: 0640
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: data
          hostPath:
            path: /var/lib/filebeat-data
            type: DirectoryOrCreate
