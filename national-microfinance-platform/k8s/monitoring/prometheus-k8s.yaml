# ==============================================================================
# Prometheus + Grafana + AlertManager — K8s Deployments
# National Digital Microfinance Platform — Production
# Namespace: microfinance-monitoring
# ==============================================================================

# ── Prometheus ConfigMap ───────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: microfinance-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'microfinance-prod'
        environment: 'production'
        region: 'et-addis'

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']
          timeout: 10s

    rule_files:
      - '/etc/prometheus/rules/*.yml'

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'spring-boot-services'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['microfinance']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: service
          - source_labels: [__meta_kubernetes_pod_label_version]
            action: replace
            target_label: version

      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.kube-system:8080']

      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ['monitoring', 'kube-system']
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app]
            action: keep
            regex: node-exporter

      - job_name: 'kafka-exporter'
        static_configs:
          - targets: ['kafka-exporter.microfinance:9308']

      - job_name: 'postgres-exporter'
        static_configs:
          - targets: ['postgres-exporter.microfinance:9187']

      - job_name: 'redis-exporter'
        static_configs:
          - targets: ['redis-exporter.microfinance:9121']

      - job_name: 'mongodb-exporter'
        static_configs:
          - targets: ['mongodb-exporter.microfinance:9216']

      - job_name: 'nginx-ingress'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['ingress-nginx']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: ingress-nginx

---
# ── Prometheus Rules ConfigMap (recording + alert) ────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: microfinance-monitoring
data:
  recording-rules.yml: |
    groups:
      - name: microfinance.sli.recording
        interval: 30s
        rules:
          # Request rate per service
          - record: job:http_requests_total:rate5m
            expr: sum by (job, service) (rate(http_server_requests_seconds_count[5m]))

          # Error rate per service
          - record: job:http_errors_total:rate5m
            expr: sum by (job, service) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))

          # Error ratio (for SLO burn rate)
          - record: job:http_error_ratio:rate5m
            expr: |
              job:http_errors_total:rate5m
              /
              job:http_requests_total:rate5m

          # p95 latency per service
          - record: job:http_request_duration_seconds:p95_5m
            expr: histogram_quantile(0.95, sum by (job, service, le) (rate(http_server_requests_seconds_bucket[5m])))

          # p99 latency per service
          - record: job:http_request_duration_seconds:p99_5m
            expr: histogram_quantile(0.99, sum by (job, service, le) (rate(http_server_requests_seconds_bucket[5m])))

          # JVM heap usage ratio
          - record: instance:jvm_heap_used_ratio
            expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}

          # DB connection pool utilization
          - record: instance:hikaricp_connection_utilization
            expr: hikaricp_connections_active / hikaricp_connections_max

  alert-rules.yml: |
    groups:
      - name: microfinance.services
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "🔴 Service {{ $labels.job }} is DOWN"
              description: "{{ $labels.job }} ({{ $labels.instance }}) has been unreachable for more than 1 minute."
              runbook: "https://wiki.microfinance.et/runbooks/service-down"

          - alert: HighErrorRate
            expr: job:http_error_ratio:rate5m > 0.05
            for: 2m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "⚠️ High error rate on {{ $labels.service }}"
              description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%) on {{ $labels.service }} for the last 2 minutes."

          - alert: CriticalErrorRate
            expr: job:http_error_ratio:rate5m > 0.10
            for: 1m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "🔴 Critical error rate on {{ $labels.service }}"
              description: "Error rate is {{ $value | humanizePercentage }} (threshold: 10%) on {{ $labels.service }}"

          - alert: HighP95Latency
            expr: job:http_request_duration_seconds:p95_5m > 2.0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "⚠️ High p95 latency on {{ $labels.service }}"
              description: "p95 latency is {{ $value | humanizeDuration }} (threshold: 2s) on {{ $labels.service }}"

          - alert: CriticalP99Latency
            expr: job:http_request_duration_seconds:p99_5m > 5.0
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "🔴 Critical p99 latency on {{ $labels.service }}"
              description: "p99 latency is {{ $value | humanizeDuration }} (threshold: 5s) on {{ $labels.service }}"

      - name: microfinance.slo
        rules:
          # 99.9% availability SLO — 1h burn rate alert
          - alert: SLOBurnRateHigh1h
            expr: |
              (
                job:http_error_ratio:rate5m{service=~"payment-service|auth-service|wallet-service"}
                > (14.4 * 0.001)
              )
              and
              (
                job:http_error_ratio:rate5m{service=~"payment-service|auth-service|wallet-service"}
                > (14.4 * 0.001)
              )
            for: 2m
            labels:
              severity: critical
              slo: availability
            annotations:
              summary: "🔴 SLO Burn Rate HIGH (1h window) for {{ $labels.service }}"
              description: "Error budget burn rate is {{ $value }} for {{ $labels.service }}. At this rate SLO will be breached in 1 hour."

          - alert: SLOBurnRateMedium6h
            expr: job:http_error_ratio:rate5m{service=~"payment-service|auth-service|wallet-service"} > (6 * 0.001)
            for: 15m
            labels:
              severity: warning
              slo: availability
            annotations:
              summary: "⚠️ SLO Burn Rate elevated (6h window) for {{ $labels.service }}"
              description: "SLO error budget is being consumed at 6x rate for {{ $labels.service }}"

      - name: microfinance.jvm
        rules:
          - alert: JVMHeapMemoryHigh
            expr: instance:jvm_heap_used_ratio > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "⚠️ JVM heap memory high on {{ $labels.job }}"
              description: "JVM heap is at {{ $value | humanizePercentage }} on {{ $labels.instance }}"

          - alert: JVMHeapMemoryCritical
            expr: instance:jvm_heap_used_ratio > 0.95
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "🔴 JVM heap memory critical on {{ $labels.job }}"
              description: "JVM heap is at {{ $value | humanizePercentage }} on {{ $labels.instance }}. OOM imminent."

          - alert: JVMGCTimeTooHigh
            expr: rate(jvm_gc_pause_seconds_sum[5m]) / rate(jvm_gc_pause_seconds_count[5m]) > 0.1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "⚠️ High GC pause time on {{ $labels.job }}"

          - alert: DatabaseConnectionPoolExhausted
            expr: instance:hikaricp_connection_utilization > 0.90
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "⚠️ DB connection pool nearly exhausted on {{ $labels.job }}"
              description: "HikariCP pool utilization is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      - name: microfinance.business
        rules:
          - alert: FraudAlertSpike
            expr: increase(fraud_alerts_total[5m]) > 50
            for: 1m
            labels:
              severity: critical
              team: fraud
            annotations:
              summary: "🔴 Fraud alert spike detected"
              description: "More than 50 fraud alerts in the last 5 minutes. Possible coordinated attack."

          - alert: PaymentSuccessRateLow
            expr: |
              sum(rate(payment_transactions_total{status="success"}[5m]))
              /
              sum(rate(payment_transactions_total[5m])) < 0.99
            for: 3m
            labels:
              severity: critical
              team: payments
            annotations:
              summary: "🔴 Payment success rate below 99%"
              description: "Payment success rate is {{ $value | humanizePercentage }}. SLA breach."

          - alert: SystemWalletLowBalance
            expr: wallet_system_balance < 100000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "⚠️ System wallet balance low"
              description: "System wallet balance is {{ $value }} ETB (threshold: 100,000 ETB)"

          - alert: KafkaConsumerLag
            expr: kafka_consumer_group_lag > 10000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "⚠️ High Kafka consumer lag: {{ $labels.group }}"
              description: "Consumer group {{ $labels.group }} lag is {{ $value }} messages"

      - name: microfinance.infrastructure
        rules:
          - alert: NodeDiskPressure
            expr: kubelet_node_name{condition="DiskPressure",status="true"} == 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "🔴 Node disk pressure on {{ $labels.node }}"

          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "⚠️ Pod {{ $labels.pod }} is crash-looping"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in 15 minutes"

          - alert: PersistentVolumeFillingUp
            expr: kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.15
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "⚠️ PersistentVolume {{ $labels.persistentvolumeclaim }} is filling up"

          - alert: TLSCertificateExpiringSoon
            expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 14
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "⚠️ TLS certificate expiring in < 14 days"
              description: "Certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}"

---
# ── Prometheus PV/PVC ─────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data-pvc
  namespace: microfinance-monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard

---
# ── Prometheus Deployment ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: microfinance-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.50.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
            - "--storage.tsdb.retention.size=45GB"
            - "--web.console.libraries=/etc/prometheus/console_libraries"
            - "--web.console.templates=/etc/prometheus/consoles"
            - "--web.enable-lifecycle"
            - "--web.enable-admin-api"
            - "--query.max-concurrency=20"
          ports:
            - name: web
              containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
            - name: rules-volume
              mountPath: /etc/prometheus/rules
            - name: prometheus-data
              mountPath: /prometheus
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
        - name: rules-volume
          configMap:
            name: prometheus-rules
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: microfinance-monitoring
  labels:
    app.kubernetes.io/name: prometheus
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090
  type: ClusterIP

---
# ── AlertManager ConfigMap ─────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: microfinance-monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url: '${SLACK_WEBHOOK_URL}'
      pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

    templates:
      - '/etc/alertmanager/templates/*.tmpl'

    route:
      receiver: 'slack-default'
      group_by: ['alertname', 'service', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-critical'
          continue: true
        - match:
            severity: critical
          receiver: 'slack-critical'
        - match:
            severity: warning
          receiver: 'slack-warnings'
        - match:
            team: fraud
          receiver: 'slack-fraud-team'
          continue: true

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['service', 'namespace']
      - source_match:
          alertname: 'ServiceDown'
        target_match_re:
          alertname: 'HighErrorRate|HighLatency'
        equal: ['service']

    receivers:
      - name: 'slack-default'
        slack_configs:
          - channel: '#microfinance-alerts'
            title: '{{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ "\n" }}{{ end }}'
            send_resolved: true

      - name: 'slack-critical'
        slack_configs:
          - channel: '#microfinance-critical'
            title: '🔴 CRITICAL: {{ .GroupLabels.alertname }}'
            text: |
              *Service:* {{ .GroupLabels.service }}
              *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
              *Runbook:* {{ range .Alerts }}{{ .Annotations.runbook }}{{ end }}
            send_resolved: true
            color: 'danger'

      - name: 'slack-warnings'
        slack_configs:
          - channel: '#microfinance-warnings'
            title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ "\n" }}{{ end }}'
            send_resolved: true
            color: 'warning'

      - name: 'slack-fraud-team'
        slack_configs:
          - channel: '#fraud-detection-alerts'
            title: '🚨 FRAUD ALERT: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ "\n" }}{{ end }}'
            send_resolved: true

      - name: 'pagerduty-critical'
        pagerduty_configs:
          - routing_key: '${PAGERDUTY_ROUTING_KEY}'
            description: '{{ .GroupLabels.alertname }}: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
            severity: 'critical'
            details:
              firing: '{{ .Alerts.Firing | len }}'
              namespace: '{{ .GroupLabels.namespace }}'

---
# ── AlertManager StatefulSet ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: alertmanager
  namespace: microfinance-monitoring
spec:
  serviceName: alertmanager
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--cluster.advertise-address=$(POD_IP):9094"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: microfinance-monitoring-secrets
                  key: SLACK_WEBHOOK_URL
            - name: PAGERDUTY_ROUTING_KEY
              valueFrom:
                secretKeyRef:
                  name: microfinance-monitoring-secrets
                  key: PAGERDUTY_ROUTING_KEY
          ports:
            - name: web
              containerPort: 9093
            - name: cluster
              containerPort: 9094
          volumeMounts:
            - name: config-volume
              mountPath: /etc/alertmanager
            - name: alertmanager-data
              mountPath: /alertmanager
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config-volume
          configMap:
            name: alertmanager-config
  volumeClaimTemplates:
    - metadata:
        name: alertmanager-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: microfinance-monitoring
spec:
  selector:
    app.kubernetes.io/name: alertmanager
  ports:
    - name: web
      port: 9093
      targetPort: 9093

---
# ── Grafana PVC + Deployment ───────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data-pvc
  namespace: microfinance-monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: microfinance-monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        jsonData:
          timeInterval: "15s"
          queryTimeout: "60s"
          httpMethod: "POST"

      - name: Elasticsearch
        type: elasticsearch
        access: proxy
        url: http://elasticsearch.microfinance-elk:9200
        database: "microfinance-app-*"
        jsonData:
          index: "microfinance-app-*"
          timeField: "@timestamp"
          esVersion: "8.x"
          logMessageField: "message"
          logLevelField: "level"

      - name: Loki
        type: loki
        access: proxy
        url: http://loki.microfinance-monitoring:3100

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provisioning
  namespace: microfinance-monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'microfinance-dashboards'
        orgId: 1
        folder: 'Microfinance Platform'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: microfinance-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.3.3
          ports:
            - name: grafana
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: microfinance-monitoring-secrets
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: microfinance-monitoring-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_SERVER_ROOT_URL
              value: "https://monitoring.microfinance.et"
            - name: GF_SECURITY_ALLOW_EMBEDDING
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ALERTING_ENABLED
              value: "false"
            - name: GF_UNIFIED_ALERTING_ENABLED
              value: "true"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SMTP_ENABLED
              value: "false"
            - name: GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS
              value: ""
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provisioning
              mountPath: /etc/grafana/provisioning/dashboards
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data-pvc
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provisioning
          configMap:
            name: grafana-dashboards-provisioning

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: microfinance-monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: grafana
      port: 3000
      targetPort: 3000

---
# ── Monitoring Ingress ─────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: microfinance-monitoring
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: monitoring-basic-auth
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - monitoring.microfinance.et
      secretName: monitoring-tls
  rules:
    - host: monitoring.microfinance.et
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090

