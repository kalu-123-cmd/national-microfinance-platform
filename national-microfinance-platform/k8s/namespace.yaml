# ==============================================================================
# Namespaces + ResourceQuotas + LimitRanges
# National Digital Microfinance Platform — Production
# ==============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: microfinance
  labels:
    app.kubernetes.io/managed-by: helm
    environment: production
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
apiVersion: v1
kind: Namespace
metadata:
  name: microfinance-monitoring
  labels:
    app.kubernetes.io/managed-by: helm
    environment: production

---
apiVersion: v1
kind: Namespace
metadata:
  name: microfinance-elk
  labels:
    app.kubernetes.io/managed-by: helm
    environment: production

---
# ==============================================================================
# ResourceQuota — microfinance namespace
# ==============================================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: microfinance-quota
  namespace: microfinance
spec:
  hard:
    requests.cpu: "40"
    requests.memory: "60Gi"
    limits.cpu: "80"
    limits.memory: "120Gi"
    pods: "200"
    persistentvolumeclaims: "50"
    services: "60"
    secrets: "100"
    configmaps: "100"

---
# ResourceQuota — monitoring namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: microfinance-monitoring
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    pods: "30"

---
# ResourceQuota — elk namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: elk-quota
  namespace: microfinance-elk
spec:
  hard:
    requests.cpu: "12"
    requests.memory: "24Gi"
    limits.cpu: "24"
    limits.memory: "48Gi"
    pods: "20"
    persistentvolumeclaims: "10"

---
# ==============================================================================
# LimitRange — microfinance namespace
# ==============================================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: microfinance-limits
  namespace: microfinance
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      max:
        cpu: "4"
        memory: "4Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "8"
        memory: "8Gi"
    - type: PersistentVolumeClaim
      max:
        storage: "100Gi"
      min:
        storage: "1Gi"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limits
  namespace: microfinance-monitoring
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: "1Gi"
      defaultRequest:
        cpu: "200m"
        memory: "256Mi"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: elk-limits
  namespace: microfinance-elk
spec:
  limits:
    - type: Container
      default:
        cpu: "2"
        memory: "4Gi"
      defaultRequest:
        cpu: "500m"
        memory: "1Gi"
