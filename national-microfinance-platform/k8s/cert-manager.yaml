# ==============================================================================
# Cert-Manager — ClusterIssuer + Certificate
# National Digital Microfinance Platform — Production
# ==============================================================================

# ── Let's Encrypt Staging (for testing) ───────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: devops@microfinance.et
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# ── Let's Encrypt Production ──────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devops@microfinance.et
    privateKeySecretRef:
      name: letsencrypt-production-key
    solvers:
      - http01:
          ingress:
            class: nginx
        selector:
          dnsNames:
            - api.microfinance.et
            - admin.microfinance.et
            - payments.microfinance.et
            - monitoring.microfinance.et

---
# ── Wildcard Certificate (requires DNS01 solver with Route53/CloudFlare) ───────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: microfinance-wildcard-cert
  namespace: microfinance
spec:
  secretName: microfinance-wildcard-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - "*.microfinance.et"
    - microfinance.et
  duration: 2160h   # 90 days
  renewBefore: 360h  # Renew 15 days before expiry

---
# ── Individual certificate for API ───────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-microfinance-cert
  namespace: microfinance
spec:
  secretName: microfinance-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - api.microfinance.et
    - admin.microfinance.et
    - payments.microfinance.et
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
