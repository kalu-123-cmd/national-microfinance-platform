name: CD — Deploy to Production (Canary)

# ==============================================================================
# Triggered by:
#   - Git tag v*.*.* (automated release deploy)
#   - Manual workflow_dispatch (choose tag + strategy)
#
# Deploy strategy:
#   1. Canary: route 10% traffic, monitor 5min
#   2. Partial: route 50% traffic, monitor 5min
#   3. Full: promote 100% traffic
#   4. Rollback: automatic if smoke tests fail
# ==============================================================================

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'
      skip_canary:
        description: 'Skip canary phase and deploy directly to 100%'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run — do not actually deploy'
        type: boolean
        default: false

env:
  ENVIRONMENT: production
  NAMESPACE: microfinance
  HELM_RELEASE: microfinance
  KUBECONFIG_SECRET: PROD_KUBECONFIG

permissions:
  contents: write
  packages: read
  id-token: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # Pre-deploy: determine tag, validate inputs
  # ────────────────────────────────────────────────────────────────
  pre-deploy:
    name: Pre-Deploy Checks
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.microfinance.et
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      deploy_url: https://api.microfinance.et
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.image_tag }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "📦 Deploying tag: ${TAG}"

      - name: Validate tag exists in registry
        if: github.event.inputs.dry_run != 'true'
        run: |
          # Check that at least one key image exists before attempting deploy
          echo "Validating tag ${{ steps.tag.outputs.tag }} exists in GHCR..."
          # Add actual registry validation here if needed

  # ────────────────────────────────────────────────────────────────
  # Canary: Deploy to 10% of pods
  # ────────────────────────────────────────────────────────────────
  deploy-canary:
    name: 🐤 Canary Deploy (10%)
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: github.event.inputs.skip_canary != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Configure kubeconfig
        if: github.event.inputs.dry_run != 'true'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Backup current release
        if: github.event.inputs.dry_run != 'true'
        run: |
          helm get values ${{ env.HELM_RELEASE }} \
            -n ${{ env.NAMESPACE }} \
            > /tmp/pre-deploy-values.yaml 2>/dev/null || echo "No existing release"
          helm history ${{ env.HELM_RELEASE }} \
            -n ${{ env.NAMESPACE }} \
            --max 10 2>/dev/null || true

      - name: Deploy canary (10% of desired replicas)
        if: github.event.inputs.dry_run != 'true'
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }}-canary ./helm/microfinance \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.tag=${{ needs.pre-deploy.outputs.image_tag }} \
            --set replicaCount.canary=1 \
            --set canary.enabled=true \
            --set canary.weight=10 \
            --set secrets.dbPassword=${{ secrets.PROD_DB_PASSWORD }} \
            --set secrets.jwtSecret=${{ secrets.PROD_JWT_SECRET }} \
            --set secrets.redisPassword=${{ secrets.PROD_REDIS_PASSWORD }} \
            --values helm/microfinance/values-production.yaml \
            --timeout 10m \
            --wait \
            --atomic

      - name: Wait and monitor canary (5 minutes)
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "⏳ Monitoring canary for 5 minutes..."
          sleep 300

      - name: Canary smoke test
        if: github.event.inputs.dry_run != 'true'
        run: |
          BASE_URL="https://api.microfinance.et"
          echo "Running canary smoke tests against ${BASE_URL}..."
          curl -sf "${BASE_URL}/actuator/health" || {
            echo "❌ Canary smoke test failed — rolling back"
            helm uninstall ${{ env.HELM_RELEASE }}-canary -n ${{ env.NAMESPACE }} || true
            exit 1
          }
          echo "✅ Canary smoke tests passed"

      - name: Post canary result
        if: always()
        run: |
          echo "## 🐤 Canary Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: ${{ needs.pre-deploy.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────
  # Full production deployment (100%)
  # ────────────────────────────────────────────────────────────────
  deploy-production:
    name: 🚀 Full Production Deploy (100%)
    runs-on: ubuntu-latest
    needs: [pre-deploy, deploy-canary]
    if: always() && (needs.deploy-canary.result == 'success' || github.event.inputs.skip_canary == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Configure kubeconfig
        if: github.event.inputs.dry_run != 'true'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Add Helm repos
        run: helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update

      - name: Deploy to Production (full rollout)
        if: github.event.inputs.dry_run != 'true'
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm/microfinance \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.tag=${{ needs.pre-deploy.outputs.image_tag }} \
            --set secrets.dbPassword=${{ secrets.PROD_DB_PASSWORD }} \
            --set secrets.jwtSecret=${{ secrets.PROD_JWT_SECRET }} \
            --set secrets.redisPassword=${{ secrets.PROD_REDIS_PASSWORD }} \
            --set secrets.mongoPassword=${{ secrets.PROD_MONGO_PASSWORD }} \
            --values helm/microfinance/values-production.yaml \
            --timeout 20m \
            --wait \
            --atomic \
            --cleanup-on-fail \
            --history-max 10

      - name: Cleanup canary
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.skip_canary != 'true'
        run: |
          helm uninstall ${{ env.HELM_RELEASE }}-canary -n ${{ env.NAMESPACE }} || true

      - name: Verify critical deployments
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "⏳ Verifying rollout status for critical services..."
          CRITICAL_SERVICES=(
            "auth-service"
            "wallet-service"
            "payment-service"
            "fraud-detection-service"
            "api-gateway"
          )
          for svc in "${CRITICAL_SERVICES[@]}"; do
            echo "Checking $svc..."
            kubectl rollout status deployment/$svc \
              -n ${{ env.NAMESPACE }} \
              --timeout=5m || {
              echo "❌ $svc rollout failed — initiating rollback"
              helm rollback ${{ env.HELM_RELEASE }} -n ${{ env.NAMESPACE }} --wait
              exit 1
            }
          done
          echo "✅ All critical services healthy"

      - name: Run production smoke tests
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "Waiting for services to stabilize..."
          sleep 30
          BASE_URL="https://api.microfinance.et"
          TESTS=(
            "${BASE_URL}/actuator/health"
          )
          for url in "${TESTS[@]}"; do
            echo "Testing: ${url}"
            curl -sf "${url}" || {
              echo "❌ Smoke test failed: ${url}"
              echo "Initiating automatic rollback..."
              helm rollback ${{ env.HELM_RELEASE }} -n ${{ env.NAMESPACE }} --wait --timeout 10m
              exit 1
            }
          done
          echo "✅ All production smoke tests passed"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: "Release ${{ needs.pre-deploy.outputs.image_tag }}"
          body: |
            ## 🚀 National Digital Microfinance Platform ${{ needs.pre-deploy.outputs.image_tag }}

            ### Deployed Services
            All 21 microservices + 3 infrastructure services deployed to production.

            ### Deployment Details
            - **Registry**: `ghcr.io/${{ github.repository_owner }}`
            - **Tag**: `${{ needs.pre-deploy.outputs.image_tag }}`
            - **Environment**: Production
            - **Strategy**: Canary → Full Rollout

            See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Notify Slack — Success
        if: success() && github.event.inputs.dry_run != 'true'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *Production Deployment SUCCESSFUL*",
              "attachments": [{
                "color": "good",
                "fields": [
                  {"title": "Tag", "value": "${{ needs.pre-deploy.outputs.image_tag }}", "short": true},
                  {"title": "Environment", "value": "Production", "short": true},
                  {"title": "Actor", "value": "${{ github.actor }}", "short": true},
                  {"title": "URL", "value": "https://api.microfinance.et", "short": true}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack — Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🔴 *Production Deployment FAILED — Rollback Initiated*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Tag", "value": "${{ needs.pre-deploy.outputs.image_tag }}", "short": true},
                  {"title": "Actor", "value": "${{ github.actor }}", "short": true}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Post deployment summary
        if: always()
        run: |
          echo "## 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ needs.pre-deploy.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://api.microfinance.et |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dry Run** | ${{ github.event.inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
