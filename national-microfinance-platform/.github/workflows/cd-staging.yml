name: CD - Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  ENVIRONMENT: staging
  NAMESPACE: microfinance-staging
  HELM_RELEASE: microfinance-staging

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.api.microfinance.et
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Add Bitnami Helm repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm/microfinance \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set secrets.dbPassword=${{ secrets.STAGING_DB_PASSWORD }} \
            --set secrets.jwtSecret=${{ secrets.STAGING_JWT_SECRET }} \
            --set secrets.redisPassword=${{ secrets.STAGING_REDIS_PASSWORD }} \
            --set ingress.hosts[0].host=staging.api.microfinance.et \
            --values helm/microfinance/values-staging.yaml \
            --timeout 10m \
            --wait \
            --atomic

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api-gateway -n ${{ env.NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/auth-service -n ${{ env.NAMESPACE }} --timeout=5m

      - name: Run smoke tests
        run: |
          sleep 30
          curl -sf https://staging.api.microfinance.et/actuator/health || exit 1
          echo "Staging deployment verified"

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: '{"text":"🔴 Staging deployment FAILED for commit ${{ github.sha }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
