input {
  # Filebeat from DaemonSet
  beats {
    port => 5044
    codec => json_lines
  }

  # Direct TCP JSON input (for services using TCP appender)
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  # ── Kubernetes metadata enrichment ────────────────────────────────────────
  if [kubernetes] {
    mutate {
      add_field => {
        "k8s_namespace" => "%{[kubernetes][namespace]}"
        "k8s_pod"       => "%{[kubernetes][pod][name]}"
        "k8s_container" => "%{[kubernetes][container][name]}"
        "k8s_node"      => "%{[kubernetes][node][name]}"
      }
    }
  }

  # ── Parse Spring Boot structured JSON logs ─────────────────────────────────
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed_log"
      skip_on_invalid_json => true
    }
    if [parsed_log] {
      mutate {
        rename => {
          "[parsed_log][level]"       => "log_level"
          "[parsed_log][logger_name]" => "logger"
          "[parsed_log][thread_name]" => "thread"
          "[parsed_log][message]"     => "log_message"
          "[parsed_log][stack_trace]" => "stack_trace"
          "[parsed_log][traceId]"     => "trace_id"
          "[parsed_log][spanId]"      => "span_id"
          "[parsed_log][pid]"         => "pid"
        }
        replace => { "message" => "%{log_message}" }
        remove_field => ["parsed_log"]
      }
    }
  }

  # ── Fallback: grok for plain-text Spring Boot log format ──────────────────
  if ![log_level] {
    grok {
      match => {
        "message" => [
          "%{TIMESTAMP_ISO8601:log_timestamp} +%{LOGLEVEL:log_level} +%{NUMBER:pid:int}? +--- +\[%{DATA:thread}\] +%{NOTSPACE:logger} +: +%{GREEDYDATA:log_message}",
          "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:log_level} --- \[%{DATA:thread}\] %{NOTSPACE:logger} : %{GREEDYDATA:log_message}"
        ]
      }
      overwrite => ["message"]
      tag_on_failure => ["_grokparsefailure_springboot"]
    }
  }

  # ── Timestamp normalization ────────────────────────────────────────────────
  date {
    match => ["log_timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "@timestamp"
    remove_field => ["log_timestamp"]
  }

  # ── Geo-IP enrichment (API gateway request logs) ──────────────────────────
  if [k8s_container] == "api-gateway" and [remote_addr] and [remote_addr] !~ /^(10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.)/ {
    geoip {
      source => "remote_addr"
      target => "geoip"
      fields => ["country_name", "city_name", "location", "ip"]
    }
  }

  # ── Error classification ───────────────────────────────────────────────────
  if [log_level] in ["ERROR", "FATAL"] {
    mutate {
      add_tag => ["error"]
    }
  }

  if [log_level] == "WARN" {
    mutate {
      add_tag => ["warning"]
    }
  }

  # ── Fraud events tagging ───────────────────────────────────────────────────
  if [k8s_container] == "fraud-detection-service" and [log_level] in ["ERROR", "WARN"] {
    mutate {
      add_tag => ["fraud-alert"]
    }
  }

  # ── Fingerprint for deduplication ─────────────────────────────────────────
  fingerprint {
    source => ["message", "k8s_pod", "@timestamp"]
    target => "[@metadata][fingerprint]"
    method => "MURMUR3"
    concatenate_sources => true
  }

  # ── Clean up unwanted fields ───────────────────────────────────────────────
  mutate {
    remove_field => [
      "agent", "ecs", "host", "input",
      "[kubernetes][pod][uid]",
      "[kubernetes][replicaset]",
      "prospector", "beat"
    ]
  }
}

output {
  # ── Application logs → rolling daily index ────────────────────────────────
  if [k8s_namespace] == "microfinance" {
    elasticsearch {
      hosts => ["elasticsearch-client.microfinance-elk:9200"]
      index => "microfinance-%{k8s_container}-%{+YYYY.MM.dd}"
      document_id => "%{[@metadata][fingerprint]}"
      ilm_enabled => true
      ilm_rollover_alias => "microfinance-app"
      ilm_policy => "microfinance-app-policy"
      manage_template => true
      template_name => "microfinance-app"
    }
  }

  # ── Audit logs → dedicated 7-year retention index ─────────────────────────
  if [k8s_container] == "audit-service" {
    elasticsearch {
      hosts => ["elasticsearch-client.microfinance-elk:9200"]
      index => "microfinance-audit-%{+YYYY.MM.dd}"
      ilm_enabled => true
      ilm_rollover_alias => "microfinance-audit"
      ilm_policy => "microfinance-audit-policy"
    }
  }

  # ── Fraud logs → dedicated compliance index ───────────────────────────────
  if [k8s_container] == "fraud-detection-service" or "fraud-alert" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch-client.microfinance-elk:9200"]
      index => "microfinance-fraud-%{+YYYY.MM.dd}"
      ilm_enabled => true
      ilm_rollover_alias => "microfinance-fraud"
      ilm_policy => "microfinance-audit-policy"
    }
  }

  # ── Slack alert for production errors ─────────────────────────────────────
  if "error" in [tags] and [k8s_namespace] == "microfinance" {
    http {
      url => "${SLACK_WEBHOOK_URL}"
      http_method => "post"
      format => "json"
      mapping => {
        "text" => "🔴 *Error in %{k8s_container}* | Pod: `%{k8s_pod}` | Level: `%{log_level}`\n```%{message}```"
      }
    }
  }
}
