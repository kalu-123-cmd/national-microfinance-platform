spring:
  application:
    name: wallet-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:postgresql://localhost:5432/wallet_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET:MjAyNkV0aGlvcGlhTmF0aW9uYWxNaWNyb2ZpbmFuY2VQbGF0Zm9ybVNlY3JldEtleUZvckRldmVsb3BtZW50T25seQ==}

logging:
  level:
    com.microfinance: DEBUG