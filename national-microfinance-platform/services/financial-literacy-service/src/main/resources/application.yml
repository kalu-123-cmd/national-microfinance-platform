spring:
  application:
    name: financial-literacy-service
  data:
    mongodb:
      uri: mongodb://${MONGO_USER:admin}:${MONGO_PASSWORD:admin123}@${MONGO_HOST:localhost}:27017/literacy_db?authSource=admin

server:
  port: 8098

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:microfinance-super-secret-jwt-key-2024-national-platform}

logging:
  level:
    com.microfinance.literacy: INFO
    org.springframework.security: WARN
